<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Cooperativa de Agua</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="background-animation">
        <div class="wave wave1"></div>
        <div class="wave wave2"></div>
        <div class="wave wave3"></div>
    </div>

    <main class="auth-container registry-container">
        <div class="glass-panel main-panel">
            <div class="logo-container">
                <img src="assets/logo.png" alt="Logo de la Cooperativa de Agua" class="logo">
            </div>

            <div class="auth-header">
                <h1>Crear Nuevo Usuario</h1>
                <p>Gestión de Cuentas del Sistema</p>
            </div>

            <form id="registerForm" class="auth-form">

                <div class="form-row">
                    <div class="input-group">
                        <label for="fullname">Nombre Completo</label>
                        <div class="input-wrapper">
                            <input type="text" id="fullname" name="fullname" placeholder="Ej: Juan Pérez" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="documentId">Código del Trabajador</label>
                        <div class="input-wrapper">
                            <input type="text" id="documentId" name="documentId" placeholder="Código del trabajador"
                                required>
                        </div>
                    </div>
                </div>

                <div class="input-group">
                    <label for="newUsername">Nombre de usuario</label>
                    <div class="input-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" class="input-icon" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                        <input type="text" id="newUsername" name="newUsername" placeholder="Asigne un usuario único"
                            required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="input-group">
                        <label for="role">Rol en el Sistema</label>
                        <div class="input-wrapper">
                            <select id="role" name="role" required class="custom-select">
                                <option value="" disabled selected>Seleccione el rol</option>
                                <option value="operador">Operador (Atención al Socio)</option>
                                <option value="administrador">Administrador</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="input-group">
                        <label for="newPassword">Contraseña</label>
                        <div class="input-wrapper">
                            <svg xmlns="http://www.w3.org/2000/svg" class="input-icon" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                            </svg>
                            <input type="password" id="newPassword" name="newPassword"
                                placeholder="Ingrese su contraseña" required>
                            <button type="button" class="toggle-password" id="toggleRegPassword">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                                    stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round" class="eye-icon">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="confirmPassword">Confirmar Contraseña</label>
                        <div class="input-wrapper">
                            <input type="password" id="confirmPassword" name="confirmPassword"
                                placeholder="Repita la contraseña" required>
                            <button type="button" class="toggle-password" id="toggleConfirmPassword">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                                    stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round" class="eye-icon">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="form-actions">
                    <a href="index.html" class="btn btn-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-primary">
                        Registrar Usuario
                        <div class="ripple"></div>
                    </button>
                </div>
            </form>
        </div>
    </main>
    <script src="script.js"></script>
</body>

</html>
